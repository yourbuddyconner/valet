name: Deploy (prod)

on:
  push:
    tags: ['v*']

# Never cancel a prod deploy in flight.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    # The prod GitHub Actions environment should have required reviewers set
    # so every tag push triggers a manual approval gate before secrets are exposed.
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: pnpm install --frozen-lockfile

      - run: echo "$GITHUB_WORKSPACE/packages/worker/node_modules/.bin" >> $GITHUB_PATH

      # Install modal globally so `modal profile current` is available to deploy.sh.
      # MODAL_TOKEN_ID + MODAL_TOKEN_SECRET (set in the Deploy step) authenticate it.
      - run: uv tool install modal

      # Reconstruct the .env.deploy.prod file from GitHub Actions variables/secrets.
      # PROJECT_NAME drives all Cloudflare resource names (worker, D1, R2, Pages).
      - name: Create deploy config
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          cat > .env.deploy.prod <<EOF
          PROJECT_NAME=${PROJECT_NAME}
          ALLOWED_EMAILS=${ALLOWED_EMAILS}
          D1_DATABASE_ID=${D1_DATABASE_ID}
          EOF

      - name: Deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          ENVIRONMENT=prod make deploy 2>&1 | tee /tmp/deploy.log
          WORKER_URL=$(grep -o 'https://[^ ]*\.workers\.dev' /tmp/deploy.log | tail -1)
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: |
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          echo "Checking $WORKER_URL/health ..."
          curl --fail --silent --max-time 15 "$WORKER_URL/health" | grep '"status":"ok"'
          echo "Worker is healthy."
