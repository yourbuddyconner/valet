name: Deploy (dev)

on:
  push:
    branches: [main]

# Prevent concurrent dev deploys — queue rather than cancel so no push is lost.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: pnpm install --frozen-lockfile

      # wrangler is a devDependency of packages/worker — no separate install needed.
      - run: echo "$GITHUB_WORKSPACE/packages/worker/node_modules/.bin" >> $GITHUB_PATH

      # Install modal globally so `modal profile current` is available to deploy.sh.
      # MODAL_TOKEN_ID + MODAL_TOKEN_SECRET (set in the Deploy step) authenticate it.
      - run: uv tool install modal

      # Reconstruct the .env.deploy.dev file from GitHub Actions variables/secrets.
      # PROJECT_NAME drives all Cloudflare resource names (worker, D1, R2, Pages).
      # MODAL_BACKEND_URL must be set explicitly — modal profile current returns the
      # profile name ("default"), not the workspace slug used in URLs ("conner-61702").
      - name: Create deploy config
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          MODAL_BACKEND_URL: ${{ secrets.MODAL_BACKEND_URL }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
        run: |
          if [ -z "${API_PUBLIC_URL}" ]; then
            echo "::error::API_PUBLIC_URL is not set on the dev environment."
            echo "Set it as a GitHub Actions variable (Settings → Environments → dev → Variables)."
            echo "Value should be the public dev Worker origin, e.g. https://dev-valet-turnkey.<account>.workers.dev"
            exit 1
          fi
          cat > .env.deploy.dev <<EOF
          PROJECT_NAME=${PROJECT_NAME}
          ALLOWED_EMAILS=${ALLOWED_EMAILS}
          D1_DATABASE_ID=${D1_DATABASE_ID}
          MODAL_BACKEND_URL=${MODAL_BACKEND_URL}
          API_PUBLIC_URL=${API_PUBLIC_URL}
          EOF

      - name: Deploy
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          ENVIRONMENT=dev make deploy 2>&1 | tee /tmp/deploy.log
          WORKER_URL=$(grep -o 'https://[^ ]*\.workers\.dev' /tmp/deploy.log | tail -1)
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: |
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          echo "Checking $WORKER_URL/health ..."
          curl --fail --silent --max-time 15 "$WORKER_URL/health" | grep '"status":"ok"'
          echo "Worker is healthy."
