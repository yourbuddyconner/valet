name: Deploy Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy frontend preview
    runs-on: ubuntu-latest
    environment: dev
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: echo "$GITHUB_WORKSPACE/packages/worker/node_modules/.bin" >> $GITHUB_PATH

      - name: Create deploy config
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          MODAL_BACKEND_URL: ${{ secrets.MODAL_BACKEND_URL }}
        run: |
          cat > .env.deploy.dev <<EOF
          PROJECT_NAME=${PROJECT_NAME}
          ALLOWED_EMAILS=${ALLOWED_EMAILS}
          D1_DATABASE_ID=${D1_DATABASE_ID}
          MODAL_BACKEND_URL=${MODAL_BACKEND_URL}
          EOF

      - name: Deploy Pages preview
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEV_WORKER_URL: ${{ vars.DEV_WORKER_URL }}
          PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          ENVIRONMENT=dev \
            PAGES_DEPLOY_BRANCH="${PREVIEW_BRANCH}" \
            WORKER_PROD_URL="${DEV_WORKER_URL}" \
            make deploy-client 2>&1 | tee /tmp/preview-deploy.log

          PREVIEW_URL=$(grep -oE 'https://[^ ]+\.pages\.dev' /tmp/preview-deploy.log | tail -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "Could not find a Pages preview URL in deploy output." >&2
            exit 1
          fi
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        with:
          script: |
            const body = `Preview deployment: ${process.env.PREVIEW_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body.startsWith('Preview deployment:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
