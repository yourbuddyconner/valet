name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Generate plugin registries
        run: cd packages/worker && bun scripts/generate-plugin-registry.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck client
        run: cd packages/client && npx tsc --noEmit

      - name: Build client
        run: cd packages/client && pnpm build

      - name: Test
        run: pnpm test
