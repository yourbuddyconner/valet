name = "${CF_WORKER_NAME}"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
previews_enabled = false

# Environment variables (set via wrangler secret)
# ENCRYPTION_KEY - for encrypting stored credentials
# GITHUB_CLIENT_ID - GitHub OAuth app client ID
# GITHUB_CLIENT_SECRET - GitHub OAuth app client secret

[vars]
# ALLOWED_EMAILS - comma-separated email allowlist. Override via .dev.vars (local) or `wrangler secret put` (production)
ALLOWED_EMAILS = "${ALLOWED_EMAILS}"
# MODAL_BACKEND_URL - your Modal workspace URL template. Override via .dev.vars (local) or `wrangler secret put` (production)
MODAL_BACKEND_URL = "${MODAL_BACKEND_URL}"
# FRONTEND_URL - set via .dev.vars (local) or `wrangler secret put` (production)
# FRONTEND_PREVIEW_ORIGIN_SUFFIX - project-specific Pages host suffix for PR preview login redirects
FRONTEND_PREVIEW_ORIGIN_SUFFIX = "${FRONTEND_PREVIEW_ORIGIN_SUFFIX}"

# Define replacements for libraries that reference Node globals
[define]
"process.env.NODE_ENV" = "\"production\""

# Durable Objects
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionAgentDO"

[[durable_objects.bindings]]
name = "EVENT_BUS"
class_name = "EventBusDO"

[[migrations]]
tag = "v1"
new_classes = ["APIKeysDurableObject", "EventBusDO"]
new_sqlite_classes = ["SessionAgentDO"]

[[migrations]]
tag = "v2"
new_classes = ["WorkflowExecutorDO"]

[[migrations]]
tag = "v3"
deleted_classes = ["APIKeysDurableObject"]

# v4 deletes the WorkflowExecutorDO class binding. The class name is
# preserved here because Cloudflare's migration registry tracks the
# delete by name. IRREVERSIBLE — once shipped, CF deletes any storage
# the DO held.
[[migrations]]
tag = "v4"
deleted_classes = ["WorkflowExecutorDO"]

# Cloudflare Workflows binding — the dag/v1 interpreter that drives
# workflow executions. See docs/specs/workflows.md.
[[workflows]]
name = "valet-workflow-interpreter"
binding = "WORKFLOW_INTERPRETER"
class_name = "ValetWorkflowInterpreter"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "${D1_DATABASE_NAME}"
# database_id - get this from `wrangler d1 create <name>`, set D1_DATABASE_ID in .env.deploy
database_id = "${D1_DATABASE_ID}"

# R2 Bucket
[[r2_buckets]]
binding = "STORAGE"
# bucket_name - create with `wrangler r2 bucket create <name>`, set R2_BUCKET_NAME in .env.deploy
bucket_name = "${R2_BUCKET_NAME}"

# Cron Triggers for scheduled syncs
[triggers]
crons = ["* * * * *", "0 3 * * *"] # Minutely reconcile + schedule dispatch; nightly archive at 3am UTC

# Observability (enables Worker and Container logs)
[observability]
enabled = true

# Development settings
[dev]
port = 8787
local_protocol = "http"
