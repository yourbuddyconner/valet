name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
      ref:
        description: 'Commit or branch to release from (defaults to tip of main)'
        required: false
        type: string

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Find the latest semver tag; default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Strip the leading 'v' and split into parts
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.next }}
          git push origin ${{ steps.version.outputs.next }}
          echo "Tagged ${{ steps.version.outputs.next }} → triggers deploy-prod"
